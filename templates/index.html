{% extends "layout.html" %}
{% block title %}Login - MedTracker{% endblock %}

{% block content %}
<div style="min-height: 80vh; display: flex; align-items: center; justify-content: center;">
    <div class="card-custom fade-in" style="width: 100%; max-width: 420px; padding: 2.5rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <div style="width: 64px; height: 64px; background: linear-gradient(135deg, var(--accent), #06b6d4); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;">
                <i class="bi bi-capsule" style="font-size: 2rem; color: white;"></i>
            </div>
            <h1 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 0.25rem;">Welcome back</h1>
            <p style="color: var(--text-muted); font-size: 0.9375rem;">Sign in to your MedTracker account</p>
        </div>

        <form action="/login" method="POST">
            <div style="margin-bottom: 1.25rem;">
                <label class="form-label-custom">Email address</label>
                <input 
                    type="email" 
                    name="email" 
                    class="form-control-custom" 
                    placeholder="you@example.com" 
                    required
                    autocomplete="email"
                >
            </div>

            <div style="margin-bottom: 1.5rem;">
                <label class="form-label-custom">Password</label>
                <div class="password-input-wrapper">
                    <input 
                        type="password" 
                        name="password" 
                        id="loginPassword"
                        class="form-control-custom" 
                        placeholder="Enter your password" 
                        required
                        autocomplete="current-password"
                    >
                    <button type="button" class="password-toggle-btn" onclick="togglePassword('loginPassword')" aria-label="Toggle password visibility">
                        <i class="bi bi-eye" id="toggleLogin-icon"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-primary-custom" style="width: 100%; justify-content: center;">
                <i class="bi bi-box-arrow-in-right"></i>
                Sign in
            </button>
        </form>

        <div style="display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0;">
            <div style="flex: 1; height: 1px; background: var(--border);"></div>
            <span style="color: var(--text-muted); font-size: 0.8125rem;">or</span>
            <div style="flex: 1; height: 1px; background: var(--border);"></div>
        </div>

        <p style="text-align: center; color: var(--text-secondary); font-size: 0.9375rem; margin: 0;">
            Don't have an account? 
            <a href="/register" style="color: var(--accent); font-weight: 600; text-decoration: none;">
                Create one
            </a>
        </p>

        <p style="text-align: center; color: var(--text-secondary); font-size: 0.8rem; margin: 0;">
            <a href="/forgot-password" style="color: var(--accent); font-weight: 600; text-decoration: none;">
                Forgot password?
            </a>
        </p>
    </div>
</div>

<script>
    // Only redirect to reset-password if this is a recovery flow (not signup)
    function parseHashParams(hash) {
        const params = {};
        if (!hash || hash === '#') return params;
        
        hash.replace('#', '').split('&').forEach(pair => {
            const [key, ...valueParts] = pair.split('=');
            if (key && valueParts.length > 0) {
                params[key] = decodeURIComponent(valueParts.join('='));
            }
        });
        return params;
    }

    const hashParams = parseHashParams(window.location.hash);
    
    // Only redirect if this is a password recovery token
    if (hashParams.access_token && hashParams.type === 'recovery') {
        window.location.href = "/reset-password" + window.location.hash;
    }
</script>
{% endblock %}
