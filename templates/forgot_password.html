{% extends "layout.html" %}
{% block title %}Forgot Password - MedTracker{% endblock %}

{% block content %}
<div style="min-height: 80vh; display: flex; align-items: center; justify-content: center;">
    <div class="card-custom" style="width: 100%; max-width: 420px; padding: 2.5rem;">

        <div style="text-align: center; margin-bottom: 2rem;">
            <h1 style="font-size: 1.5rem; font-weight: 700;">Forgot Password</h1>
            <p style="color: var(--text-muted); font-size: 0.9rem;">
                Enter your email and we’ll send you a reset link
            </p>
        </div>

        <form method="POST">
            <div style="margin-bottom: 1.25rem;">
                <label class="form-label-custom">Email address</label>
                <input 
                    type="email"
                    name="email"
                    class="form-control-custom"
                    placeholder="you@example.com"
                    required
                >
            </div>

            <button type="submit" class="btn-primary-custom" style="width: 100%;">
                Send reset link
            </button>
        </form>

        <p style="text-align: center; color: var(--text-secondary); font-size: 0.9375rem; margin-top: 1rem;">
            <a href="/" style="color: var(--accent); text-decoration:none;">
                Back to login
            </a>
        </p>

    </div>
</div>
{% endblock %}
