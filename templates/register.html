{% extends "layout.html" %}
{% block title %}Create Account - MedTracker{% endblock %}

{% block content %}
<div style="min-height: 80vh; display: flex; align-items: center; justify-content: center;">
    <div class="card-custom fade-in" style="width: 100%; max-width: 420px; padding: 2.5rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <div style="width: 64px; height: 64px; background: linear-gradient(135deg, var(--success), #34d399); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;">
                <i class="bi bi-person-plus" style="font-size: 2rem; color: white;"></i>
            </div>
            <h1 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 0.25rem;">Create your account</h1>
            <p style="color: var(--text-muted); font-size: 0.9375rem;">Start tracking your medications today</p>
        </div>

        <form action="/register" method="POST" onsubmit="return validateRegisterForm()">
            <div style="margin-bottom: 1.25rem;">
                <label class="form-label-custom">Email address</label>
                <input 
                    type="email" 
                    name="email" 
                    class="form-control-custom" 
                    placeholder="you@example.com" 
                    required
                    autocomplete="email"
                >
            </div>

            <div style="margin-bottom: 1.25rem;">
                <label class="form-label-custom">Password</label>
                <div class="password-input-wrapper">
                    <input 
                        type="password" 
                        name="password" 
                        id="registerPassword"
                        class="form-control-custom" 
                        placeholder="Create a strong password" 
                        required
                        autocomplete="new-password"
                        minlength="8"
                    >
                    <button type="button" class="password-toggle-btn" onclick="togglePassword('registerPassword')" aria-label="Toggle password visibility">
                        <i class="bi bi-eye" id="toggleRegister-icon"></i>
                    </button>
                </div>
                <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.5rem;">
                    Must be at least 8 characters
                </p>
            </div>

            <div style="margin-bottom: 1.5rem;">
                <label class="form-label-custom">Confirm Password</label>
                <div class="password-input-wrapper">
                    <input 
                        type="password" 
                        name="confirm_password" 
                        id="registerConfirmPassword"
                        class="form-control-custom" 
                        placeholder="Confirm your password" 
                        required
                        autocomplete="new-password"
                        minlength="8"
                    >
                    <button type="button" class="password-toggle-btn" onclick="togglePassword('registerConfirmPassword')" aria-label="Toggle password visibility">
                        <i class="bi bi-eye" id="toggleRegisterConfirm-icon"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-primary-custom" style="width: 100%; justify-content: center; background: var(--success);">
                <i class="bi bi-check-circle"></i>
                Create account
            </button>
        </form>

        <div style="display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0;">
            <div style="flex: 1; height: 1px; background: var(--border);"></div>
            <span style="color: var(--text-muted); font-size: 0.8125rem;">or</span>
            <div style="flex: 1; height: 1px; background: var(--border);"></div>
        </div>

        <p style="text-align: center; color: var(--text-secondary); font-size: 0.9375rem; margin: 0;">
            Already have an account? 
            <a href="/" style="color: var(--accent); font-weight: 600; text-decoration: none;">
                Sign in
            </a>
        </p>
    </div>
</div>

<script>
    function validateRegisterForm() {
        const password = document.querySelector('input[name="password"]').value;
        const confirm = document.querySelector('input[name="confirm_password"]').value;
        
        if (password !== confirm) {
            alert("Passwords do not match. Please try again.");
            return false;
        }
        if (password.length < 8) {
            alert("Password must be at least 8 characters long.");
            return false;
        }
        return true;
    }
</script>
{% endblock %}
