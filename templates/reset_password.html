{% extends "layout.html" %}
{% block title %}Reset Password - MedTracker{% endblock %}

{% block content %}
<div style="min-height: 80vh; display: flex; align-items: center; justify-content: center;">
    <div class="card-custom" style="width: 100%; max-width: 420px; padding: 2.5rem;">

        <div style="text-align: center; margin-bottom: 2rem;">
            <h1 style="font-size: 1.5rem; font-weight: 700;">Reset Password</h1>
            <p style="color: var(--text-muted); font-size: 0.9rem;">
                Enter your new password below
            </p>
        </div>

        <form onsubmit="event.preventDefault(); updatePassword();">
            <!-- New Password -->
<div style="margin-bottom: 1.25rem;">
    <label class="form-label-custom">New Password</label>
    <div class="password-input-wrapper">
        <input 
            id="password"
            type="password"
            class="form-control-custom"
            placeholder="Enter new password (min 8 characters)"
            required
            minlength="8"
        >
        <button type="button" class="password-toggle-btn" onclick="togglePassword('password')" aria-label="Toggle password visibility">
            <i class="bi bi-eye" id="togglePassword-icon"></i>
        </button>
    </div>
</div>

<!-- Confirm Password -->
<div style="margin-bottom: 1.25rem;">
    <label class="form-label-custom">Confirm Password</label>
    <div class="password-input-wrapper">
        <input 
            id="confirm_password"
            type="password"
            class="form-control-custom"
            placeholder="Confirm new password"
            required
            minlength="8"
        >
        <button type="button" class="password-toggle-btn" onclick="togglePassword('confirm_password')" aria-label="Toggle password visibility">
            <i class="bi bi-eye" id="toggleConfirm-icon"></i>
        </button>
    </div>
</div>
            <button type="submit" class="btn-primary-custom" style="width: 100%;" id="submitBtn">
                Update Password
            </button>
        </form>

        <p style="text-align:center; margin-top: 1rem;">
            <a href="/" style="color: var(--accent); text-decoration:none;">
                Back to login
            </a>
        </p>

    </div>
</div>

<script>
    

    // Robust hash parameter parser
    function parseHashParams(hash) {
        const params = {};
        if (!hash || hash === '#') return params;
        
        hash.replace('#', '').split('&').forEach(pair => {
            const [key, ...valueParts] = pair.split('=');
            if (key && valueParts.length > 0) {
                params[key] = decodeURIComponent(valueParts.join('='));
            }
        });
        return params;
    }

    const hashParams = parseHashParams(window.location.hash);
    const accessToken = hashParams.access_token;
    const refreshToken = hashParams.refresh_token;

    if (!accessToken) {
        alert("Invalid or expired reset link. Please request a new password reset.");
        window.location.href = "/forgot-password";
    }

    async function updatePassword() {
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirm_password").value;
        const submitBtn = document.getElementById("submitBtn");

        if (password !== confirmPassword) {
            alert("Passwords do not match!");
            return;
        }
        if (password.length < 8) {
            alert("Password must be at least 8 characters long.");
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = "Updating...";

        try {
            const res = await fetch("/update-password", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    password: password,
                    access_token: accessToken,
                    refresh_token: refreshToken
                })
            });

            const data = await res.json();

            if (res.ok) {
                alert("Password updated successfully. Please log in with your new password.");
                window.location.hash = "";
                window.location.href = "/";
            } else {
                // Display user-friendly message from backend
                const message = data.user_message || data.error || "Failed to update password. Please try again.";
                alert(message);
                console.error("Error details:", data.details);
            }
        } catch (error) {
            console.error("Network error:", error);
            alert("Network error. Please check your connection and try again.");
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = "Update Password";
        }
    }
</script>
{% endblock %}
