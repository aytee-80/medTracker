{% extends "layout.html" %}
{% block title %}Reset Password - MedTracker{% endblock %}

{% block content %}
<div style="min-height: 80vh; display: flex; align-items: center; justify-content: center;">
    <div class="card-custom" style="width: 100%; max-width: 420px; padding: 2.5rem;">

        <div style="text-align: center; margin-bottom: 2rem;">
            <h1 style="font-size: 1.5rem; font-weight: 700;">Reset Password</h1>
            <p style="color: var(--text-muted); font-size: 0.9rem;">
                Enter your new password below
            </p>
        </div>

        <!-- Regular form POST - enables flash messages -->
        <form action="/update-password" method="POST" onsubmit="return validateResetForm()">
            <!-- Hidden fields for tokens -->
            <input type="hidden" id="access_token" name="access_token">
            <input type="hidden" id="refresh_token" name="refresh_token">

            <div style="margin-bottom: 1.25rem;">
                <label class="form-label-custom">New Password</label>
                <div class="password-input-wrapper">
                    <input 
                        id="password"
                        name="password"
                        type="password"
                        class="form-control-custom"
                        placeholder="Enter new password (min 8 characters)"
                        required
                        minlength="8"
                    >
                    <button type="button" class="password-toggle-btn" onclick="togglePassword('password')" aria-label="Toggle password visibility">
                        <i class="bi bi-eye" id="togglePassword-icon"></i>
                    </button>
                </div>
            </div>

            <div style="margin-bottom: 1.25rem;">
                <label class="form-label-custom">Confirm Password</label>
                <div class="password-input-wrapper">
                    <input 
                        id="confirm_password"
                        type="password"
                        class="form-control-custom"
                        placeholder="Confirm new password"
                        required
                        minlength="8"
                    >
                    <button type="button" class="password-toggle-btn" onclick="togglePassword('confirm_password')" aria-label="Toggle password visibility">
                        <i class="bi bi-eye" id="toggleConfirm-icon"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-primary-custom" style="width: 100%;" id="submitBtn">
                Update Password
            </button>
        </form>

        <p style="text-align:center; margin-top: 1rem;">
            <a href="/" style="color: var(--accent); text-decoration:none;">
                Back to login
            </a>
        </p>

    </div>
</div>

<script>
    // Parse hash parameters robustly
    function parseHashParams(hash) {
        const params = {};
        if (!hash || hash === '#') return params;
        
        hash.replace('#', '').split('&').forEach(pair => {
            const [key, ...valueParts] = pair.split('=');
            if (key && valueParts.length > 0) {
                params[key] = decodeURIComponent(valueParts.join('='));
            }
        });
        return params;
    }

    // Extract and validate tokens on page load
    const hashParams = parseHashParams(window.location.hash);
    const accessToken = hashParams.access_token;
    const refreshToken = hashParams.refresh_token;
    const tokenType = hashParams.type;

    // Only allow recovery tokens
    if (!accessToken || tokenType !== 'recovery') {
        // Use a temporary alert for this validation error (can't flash without backend)
        alert("Invalid or expired reset link. Please request a new password reset.");
        window.location.href = "/forgot-password";
    } else {
        // Populate hidden form fields
        document.getElementById('access_token').value = accessToken;
        document.getElementById('refresh_token').value = refreshToken || '';
    }

    // Client-side form validation
    function validateResetForm() {
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirm_password").value;
        const submitBtn = document.getElementById("submitBtn");

        if (password !== confirmPassword) {
            alert("Passwords do not match!");
            return false;
        }
        if (password.length < 8) {
            alert("Password must be at least 8 characters long.");
            return false;
        }

        // Disable button to prevent double-submit
        submitBtn.disabled = true;
        submitBtn.textContent = "Updating...";
        return true;
    }

    // Re-enable button if user navigates back
    window.addEventListener('pageshow', function(event) {
        if (event.persisted) {
            const submitBtn = document.getElementById("submitBtn");
            if (submitBtn) {
                submitBtn.disabled = false;
                submitBtn.textContent = "Update Password";
            }
        }
    });
</script>
{% endblock %}
