{% extends "layout.html" %}
{% block title %}Reset Password - MedTracker{% endblock %}

{% block content %}
<div style="min-height: 80vh; display: flex; align-items: center; justify-content: center;">
    <div class="card-custom" style="width: 100%; max-width: 420px; padding: 2.5rem;">

        <div style="text-align: center; margin-bottom: 2rem;">
            <h1 style="font-size: 1.5rem; font-weight: 700;">Reset Password</h1>
            <p style="color: var(--text-muted); font-size: 0.9rem;">
                Enter your new password below
            </p>
        </div>

        <form onsubmit="event.preventDefault(); updatePassword();">
            <div style="margin-bottom: 1.25rem;">
                <label class="form-label-custom">New Password</label>

                <input 
                    id="password"
                    type="password"
                    class="form-control-custom"
                    placeholder="Enter new password"
                    required
                    minlength="8"
                >
            </div>

            <button type="submit" class="btn-primary-custom" style="width: 100%;">
                Update Password
            </button>
        </form>

        <p style="text-align:center; margin-top: 1rem;">
            <a href="/" style="color: var(--accent); text-decoration:none;">
                Back to login
            </a>
        </p>

    </div>
</div>
<script>
    const hash = window.location.hash;
    const params = new URLSearchParams(hash.replace('#', ''));
    const accessToken = params.get("access_token");

    async function updatePassword() {
        const password = document.getElementById("password").value;

        if (!accessToken) {
            alert("Invalid reset link");
            return;
        }

        const res = await fetch("/update-password", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                password: password,
                access_token: accessToken
            })
        });

        const data = await res.json();
        console.log(accessToken);
        if (res.ok) {
            alert("Password updated successfully");
            window.location.href = "/";
        } else {
            alert(data.error || "Failed to update password");
        }
    }
</script>
{% endblock %}
